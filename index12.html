<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda 12 | Eco Fresh</title>
    <!-- Importando tipografía redondeada y amigable -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --eco-green: #52B788;
            --eco-green-dark: #40916C;
            --eco-light: #D8F3DC;
            --earth-brown: #5C4D43;
            --bg-body: #F9FBF9;
            --surface: #FFFFFF;
            --text-main: #2D3A33;
            --text-muted: #74857B;
            --radius-large: 24px;
            --radius-medium: 16px;
            --shadow-soft: 0 10px 40px rgba(64, 145, 108, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
            border-bottom: 2px solid var(--eco-light);
        }

        .brand-logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--eco-green-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-logo span {
            font-size: 28px;
        }

        .cart-trigger {
            background: var(--eco-light);
            color: var(--eco-green-dark);
            border: 2px solid transparent;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .cart-trigger:hover {
            border-color: var(--eco-green);
            background: var(--surface);
        }

        .cart-bubble {
            background: var(--eco-green);
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 14px;
        }

        .hero {
            background: linear-gradient(135deg, var(--eco-light) 0%, #B7E4C7 100%);
            padding: 60px 5% 80px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 40px;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1200 120' preserveAspectRatio='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C59.71,118,137.94,136.3,219.92,109.83,257.65,97.71,291.6,76.54,321.39,56.44Z' fill='%23F9FBF9'/%3E%3C/svg%3E");
            background-size: cover;
            background-repeat: no-repeat;
        }

        .hero h1 {
            font-size: 42px;
            font-weight: 700;
            color: var(--eco-green-dark);
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 18px;
            color: var(--earth-brown);
            max-width: 600px;
            margin: 0 auto;
            font-weight: 600;
        }

        .main-wrapper {
            padding: 40px 5% 80px;
            max-width: 1200px;
            margin: 0 auto;
            flex-grow: 1;
            width: 100%;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .eco-card {
            background: var(--surface);
            border-radius: var(--radius-large);
            padding: 20px;
            box-shadow: var(--shadow-soft);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(82, 183, 136, 0.1);
            display: flex;
            flex-direction: column;
        }

        .eco-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 45px rgba(64, 145, 108, 0.15);
        }

        .card-image-wrapper {
            width: 100%;
            height: 220px;
            border-radius: var(--radius-medium);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .eco-card:hover .card-image-wrapper img {
            transform: scale(1.05);
        }

        .card-header h3 {
            font-size: 22px;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 25px;
            flex-grow: 1;
        }

        .controls-wrapper {
            background: var(--bg-body);
            border-radius: var(--radius-medium);
            padding: 15px;
            margin-bottom: 20px;
        }

        .eco-select {
            width: 100%;
            background: var(--surface);
            border: 2px solid var(--eco-light);
            color: var(--text-main);
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            appearance: none;
            margin-bottom: 12px;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2340916C' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 15px center;
        }

        .eco-select:focus {
            border-color: var(--eco-green);
        }

        .eco-checkbox {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .eco-checkbox input {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--eco-green);
            border-radius: 6px;
            background: var(--surface);
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .eco-checkbox input:checked {
            background: var(--eco-green);
        }

        .eco-checkbox input:checked::after {
            content: '✓';
            color: white;
            position: absolute;
            font-size: 14px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .card-action {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
        }

        .price-display {
            font-size: 26px;
            font-weight: 700;
            color: var(--eco-green-dark);
        }

        .price-display span {
            font-size: 16px;
            vertical-align: top;
        }

        .btn-harvest {
            background: var(--eco-green);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        .btn-harvest:active {
            transform: scale(0.95);
        }

        .btn-harvest:hover {
            background: var(--eco-green-dark);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(45, 58, 51, 0.4);
            backdrop-filter: blur(4px);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s ease;
            z-index: 100;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background: var(--surface);
            z-index: 101;
            display: flex;
            flex-direction: column;
            transition: right 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            border-top-left-radius: var(--radius-large);
            border-bottom-left-radius: var(--radius-large);
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }

        .sidebar.active {
            right: 0;
        }

        .sidebar-header {
            padding: 30px 25px;
            background: var(--eco-light);
            border-top-left-radius: var(--radius-large);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            color: var(--eco-green-dark);
            font-size: 22px;
        }

        .btn-close {
            background: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 16px;
            font-weight: bold;
            color: var(--eco-green-dark);
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .cart-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 25px;
        }

        .empty-basket {
            text-align: center;
            color: var(--text-muted);
            margin-top: 40px;
            font-size: 16px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--bg-body);
            border-radius: var(--radius-medium);
            margin-bottom: 15px;
            border: 1px solid var(--eco-light);
        }

        .item-info h4 {
            font-size: 16px;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .item-info p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .item-price {
            font-weight: 700;
            color: var(--eco-green-dark);
            font-size: 16px;
        }

        .sidebar-footer {
            padding: 25px;
            background: var(--surface);
            border-top: 1px solid var(--eco-light);
        }

        .total-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
        }

        .btn-checkout {
            width: 100%;
            background: var(--eco-green);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-checkout:hover {
            background: var(--eco-green-dark);
        }

        /* Responsivo */
        @media (max-width: 600px) {
            .sidebar {
                border-radius: 0;
            }
            .sidebar-header {
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="brand-logo">
            <span>🌿</span> EcoFresh
        </div>
        <button class="cart-trigger" onclick="toggleDrawer()">
            Cesta <span class="cart-bubble" id="cartCount">0</span>
        </button>
    </nav>

    <header class="hero">
        <h1 id="storeTitle">Cargando la frescura...</h1>
        <p>Ingredientes seleccionados directamente de la naturaleza para ti.</p>
    </header>

    <main class="main-wrapper">
        <div class="grid-container" id="productGrid">
            <!-- Productos cargados dinámicamente -->
        </div>
    </main>

    <div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Tu Cesta</h2>
            <button class="btn-close" onclick="toggleDrawer()">✕</button>
        </div>
        <div class="cart-content" id="cartItems">
            <div class="empty-basket">Tu cesta está vacía. ¡Agrega algo fresco!</div>
        </div>
        <div class="sidebar-footer">
            <div class="total-box">
                <span>Total</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="btn-checkout">Finalizar Compra</button>
        </div>
    </aside>

    <script>
        const API_URL = 'https://routicket.com/tienda/get_tienda.php?id_tienda=15510';
        
        const productGrid = document.getElementById('productGrid');
        const cartItemsContainer = document.getElementById('cartItems');
        const cartTotalEl = document.getElementById('cartTotal');
        const cartCountEl = document.getElementById('cartCount');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        let cart = [];

        function toggleDrawer() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
        }

        async function initEcoStore() {
            try {
                const response = await fetch(API_URL);
                const json = await response.json();

                if (json.data && json.data.titulo) {
                    document.getElementById('storeTitle').textContent = json.data.titulo;
                    document.title = `${json.data.titulo} | Eco Fresh`;
                }

                renderProducts(json.data.productos);
            } catch (error) {
                productGrid.innerHTML = '<p style="text-align: center; grid-column: 1/-1; color: var(--text-muted);">Error al conectar con la huerta. Intenta más tarde.</p>';
            }
        }

        function renderProducts(products) {
            productGrid.innerHTML = '';

            if (!products || products.length === 0) return;

            products.forEach(item => {
                const card = document.createElement('div');
                card.className = 'eco-card';

                // Imagen de pizza con albahaca fresca para mantener la temática
                const defaultImage = 'https://images.unsplash.com/photo-1574071318508-1cdbab80d002?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80';

                card.innerHTML = `
                    <div class="card-image-wrapper">
                        <img src="${item.image || defaultImage}" alt="${item.name}" loading="lazy">
                    </div>
                    <div class="card-header">
                        <h3>${item.name}</h3>
                        <p class="card-desc">${item.description || 'Nuestra receta clásica elaborada con tomates orgánicos y albahaca recién cosechada.'}</p>
                    </div>
                    
                    <div class="controls-wrapper">
                        <select class="eco-select size-dropdown">
                            <option value="0">Tamaño Individual</option>
                            <option value="40">Tamaño Mediana (+ $40.00)</option>
                            <option value="80">Tamaño Familiar (+ $80.00)</option>
                        </select>
                        
                        <label class="eco-checkbox">
                            <input type="checkbox" class="cheese-border">
                            Añadir borde de queso natural (+ $35.00)
                        </label>
                    </div>

                    <div class="card-action">
                        <div class="price-display"><span>$</span><span class="price-val">${parseFloat(item.price).toFixed(2)}</span></div>
                        <button class="btn-harvest">Agregar</button>
                    </div>
                `;

                const sizeDropdown = card.querySelector('.size-dropdown');
                const cheeseBorder = card.querySelector('.cheese-border');
                const priceVal = card.querySelector('.price-val');
                const addBtn = card.querySelector('.btn-harvest');

                const recalculatePrice = () => {
                    let base = Number(item.price);
                    let sizeCost = Number(sizeDropdown.value);
                    let borderCost = cheeseBorder.checked ? 35 : 0;
                    let total = base + sizeCost + borderCost;
                    priceVal.textContent = total.toFixed(2);
                    return total;
                };

                sizeDropdown.addEventListener('change', recalculatePrice);
                cheeseBorder.addEventListener('change', recalculatePrice);

                addBtn.addEventListener('click', () => {
                    const finalPrice = recalculatePrice();
                    const sizeText = sizeDropdown.options[sizeDropdown.selectedIndex].text.split('(')[0].trim();
                    const extraText = cheeseBorder.checked ? 'c/ Borde' : '';
                    const details = `${sizeText} ${extraText}`;
                    
                    // Efecto visual amigable
                    addBtn.textContent = '¡Listo!';
                    addBtn.style.backgroundColor = 'var(--eco-green-dark)';
                    setTimeout(() => {
                        addBtn.textContent = 'Agregar';
                        addBtn.style.backgroundColor = 'var(--eco-green)';
                    }, 1000);

                    cart.push({
                        name: item.name,
                        details: details.trim(),
                        price: finalPrice
                    });

                    updateCartRender();
                });

                productGrid.appendChild(card);
            });
        }

        function updateCartRender() {
            cartItemsContainer.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<div class="empty-basket">Tu cesta está vacía. ¡Agrega algo fresco!</div>';
            } else {
                cart.forEach((item) => {
                    total += item.price;
                    cartItemsContainer.innerHTML += `
                        <div class="cart-item">
                            <div class="item-info">
                                <h4>1x ${item.name}</h4>
                                <p>${item.details}</p>
                            </div>
                            <div class="item-price">$${item.price.toFixed(2)}</div>
                        </div>
                    `;
                });
            }

            cartTotalEl.textContent = `$${total.toFixed(2)}`;
            cartCountEl.textContent = cart.length;
            
            // Animación de rebote suave en el contador
            cartCountEl.animate([
                { transform: 'translateY(0)' },
                { transform: 'translateY(-5px)' },
                { transform: 'translateY(0)' }
            ], {
                duration: 300,
                iterations: 1,
                easing: 'ease-out'
            });
        }

        // Ejecutar
        initEcoStore();
    </script>
</body>
</html>
