<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda 11 | Retro Diner</title>
    <!-- Importando fuentes vintage y legibles -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Josefin+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --diner-red: #E63946;
            --diner-red-dark: #B00020;
            --diner-cream: #FFF8E7;
            --diner-teal: #457B9D;
            --diner-teal-dark: #1D3557;
            --text-dark: #2B2D42;
            --white: #FFFFFF;
            --border-thick: 3px solid var(--text-dark);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Josefin Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--diner-cream);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .stripes {
            height: 12px;
            background: repeating-linear-gradient(
                45deg,
                var(--diner-red),
                var(--diner-red) 15px,
                var(--white) 15px,
                var(--white) 30px
            );
            border-bottom: 2px solid var(--text-dark);
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 101;
        }

        nav {
            background-color: var(--diner-teal);
            padding: 20px 5%;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            z-index: 100;
            border-bottom: var(--border-thick);
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .brand {
            font-family: 'Pacifico', cursive;
            font-size: 28px;
            color: var(--white);
            text-shadow: 2px 2px 0 var(--diner-teal-dark);
            letter-spacing: 1px;
        }

        .cart-toggle {
            background: var(--diner-red);
            color: var(--white);
            border: var(--border-thick);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 2px 4px 0 var(--text-dark);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.1s ease;
        }

        .cart-toggle:active {
            transform: translate(2px, 4px);
            box-shadow: 0 0 0 var(--text-dark);
        }

        .badge {
            background: var(--white);
            color: var(--diner-red);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 14px;
            border: 2px solid var(--text-dark);
        }

        .hero {
            margin-top: 100px;
            padding: 40px 5%;
            text-align: center;
            background-image: radial-gradient(var(--white) 20%, transparent 20%), radial-gradient(var(--white) 20%, transparent 20%);
            background-color: var(--diner-cream);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
            border-bottom: var(--border-thick);
        }

        .hero-banner {
            background: var(--white);
            display: inline-block;
            padding: 20px 40px;
            border: var(--border-thick);
            border-radius: 10px;
            box-shadow: 6px 6px 0 var(--diner-teal);
            transform: rotate(-1deg);
        }

        .hero h1 {
            font-family: 'Pacifico', cursive;
            font-size: 42px;
            color: var(--diner-red);
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
        }

        .hero p {
            font-size: 18px;
            font-weight: 600;
            color: var(--diner-teal-dark);
        }

        .menu-container {
            padding: 50px 5%;
            max-width: 1200px;
            margin: 0 auto;
            flex-grow: 1;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
        }

        .product-card {
            background: var(--white);
            border: var(--border-thick);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 6px 6px 0 var(--text-dark);
            transition: transform 0.2s;
        }

        .product-card:hover {
            transform: translateY(-5px) rotate(1deg);
        }

        .product-img {
            width: 100%;
            height: 200px;
            border: 2px solid var(--text-dark);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--diner-teal-dark);
            margin-bottom: 8px;
        }

        .product-desc {
            font-size: 15px;
            color: #555;
            margin-bottom: 20px;
            flex-grow: 1;
            line-height: 1.4;
        }

        .diner-select, .diner-checkbox {
            width: 100%;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .diner-select select {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--text-dark);
            border-radius: 6px;
            background: var(--diner-cream);
            color: var(--text-dark);
            cursor: pointer;
            outline: none;
            font-family: inherit;
            font-weight: bold;
        }

        .diner-select select:focus {
            border-color: var(--diner-red);
        }

        .diner-checkbox label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            background: #F0F0F0;
            padding: 10px;
            border-radius: 6px;
            border: 2px solid var(--text-dark);
        }

        .diner-checkbox input[type="checkbox"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-dark);
            border-radius: 4px;
            background: var(--white);
            cursor: pointer;
            position: relative;
        }

        .diner-checkbox input[type="checkbox"]:checked {
            background: var(--diner-red);
        }

        .diner-checkbox input[type="checkbox"]:checked::after {
            content: '✓';
            color: white;
            position: absolute;
            font-size: 16px;
            top: -2px;
            left: 2px;
            font-weight: bold;
        }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed var(--text-dark);
        }

        .price-tag {
            font-size: 24px;
            font-weight: 700;
            color: var(--diner-red);
        }

        .btn-add {
            background: var(--diner-teal);
            color: var(--white);
            border: 2px solid var(--text-dark);
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 2px 4px 0 var(--text-dark);
            transition: all 0.1s ease;
        }

        .btn-add:active {
            transform: translate(2px, 4px);
            box-shadow: 0 0 0 var(--text-dark);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(43, 45, 66, 0.6);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 1000;
        }

        .overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .ticket-sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: var(--diner-cream);
            border-left: var(--border-thick);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: -10px 0 20px rgba(0,0,0,0.2);
        }

        .ticket-sidebar.open {
            right: 0;
        }

        .ticket-header {
            background: var(--white);
            padding: 25px 20px;
            border-bottom: 2px dashed var(--text-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-image: repeating-linear-gradient(45deg, #f0f0f0 25%, transparent 25%, transparent 75%, #f0f0f0 75%, #f0f0f0), repeating-linear-gradient(45deg, #f0f0f0 25%, #fff 25%, #fff 75%, #f0f0f0 75%, #f0f0f0);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
        }

        .ticket-header h2 {
            font-family: 'Pacifico', cursive;
            font-size: 26px;
            color: var(--diner-red);
            background: var(--white);
            padding: 5px 15px;
            border: 2px solid var(--text-dark);
            transform: rotate(-2deg);
        }

        .close-btn {
            background: var(--white);
            border: 2px solid var(--text-dark);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 var(--text-dark);
        }

        .close-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 var(--text-dark);
        }

        .ticket-body {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            background: repeating-linear-gradient(transparent, transparent 29px, #ccc 30px);
            background-attachment: local;
        }

        .empty-ticket {
            text-align: center;
            color: #888;
            font-style: italic;
            margin-top: 40px;
            font-size: 18px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 15px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 10px;
        }

        .order-info h4 {
            font-size: 16px;
            color: var(--text-dark);
        }

        .order-info span {
            font-size: 13px;
            color: #666;
            display: block;
            margin-top: 4px;
        }

        .order-price {
            font-size: 16px;
            color: var(--diner-red-dark);
        }

        .ticket-footer {
            padding: 20px;
            background: var(--white);
            border-top: var(--border-thick);
        }

        .ticket-total {
            display: flex;
            justify-content: space-between;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            font-family: 'Courier New', Courier, monospace;
        }

        .btn-checkout {
            width: 100%;
            background: var(--diner-red);
            color: var(--white);
            border: var(--border-thick);
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 4px 6px 0 var(--text-dark);
            transition: all 0.1s ease;
            text-transform: uppercase;
        }

        .btn-checkout:active {
            transform: translate(4px, 6px);
            box-shadow: 0 0 0 var(--text-dark);
        }

    </style>
</head>
<body>

    <div class="stripes"></div>
    <nav>
        <div class="brand">Routicket Diner</div>
        <button class="cart-toggle" onclick="toggleTicket()">
            Mi Comanda <span class="badge" id="cartBadge">0</span>
        </button>
    </nav>

    <header class="hero">
        <div class="hero-banner">
            <h1 id="storeTitle">Cargando la rockola...</h1>
            <p>¡Las mejores pizzas del condado, directo a tu mesa!</p>
        </div>
    </header>

    <main class="menu-container">
        <div class="product-grid" id="productGrid">
            <!-- Productos se inyectan aquí -->
        </div>
    </main>

    <div class="overlay" id="overlay" onclick="toggleTicket()"></div>
    <aside class="ticket-sidebar" id="sidebar">
        <div class="ticket-header">
            <h2>Order Ticket</h2>
            <button class="close-btn" onclick="toggleTicket()">✕</button>
        </div>
        <div class="ticket-body" id="ticketItems">
            <div class="empty-ticket">La comanda está en blanco. ¡Pide algo delicioso!</div>
        </div>
        <div class="ticket-footer">
            <div class="ticket-total">
                <span>TOTAL A PAGAR</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="btn-checkout">Ordenar Ahora</button>
        </div>
    </aside>

    <script>
        const API_URL = 'https://routicket.com/tienda/get_tienda.php?id_tienda=15510';
        
        const productGrid = document.getElementById('productGrid');
        const ticketItemsContainer = document.getElementById('ticketItems');
        const cartTotalEl = document.getElementById('cartTotal');
        const cartBadge = document.getElementById('cartBadge');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        let cart = [];

        // Función para abrir/cerrar la comanda lateral
        function toggleTicket() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
            document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : '';
        }

        // Inicializar la aplicación y cargar datos
        async function initDiner() {
            try {
                const response = await fetch(API_URL);
                const json = await response.json();

                if (json.data && json.data.titulo) {
                    document.getElementById('storeTitle').textContent = json.data.titulo;
                    document.title = `${json.data.titulo} | Retro Diner`;
                }

                renderMenu(json.data.productos);
            } catch (error) {
                productGrid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px; border: 3px solid #2B2D42; background: white;">
                        <h2 style="color: #E63946;">¡Rayos! Se descompuso la rockola.</h2>
                        <p>No pudimos cargar el menú. Intenta refrescar la página en unos minutos.</p>
                    </div>`;
            }
        }

        // Función para renderizar el menú
        function renderMenu(products) {
            productGrid.innerHTML = '';

            if (!products || products.length === 0) return;

            products.forEach(item => {
                const card = document.createElement('article');
                card.className = 'product-card';

                // Imagen por defecto estilo pizza clásica
                const defaultImg = 'https://images.unsplash.com/photo-1574071318508-1cdbab80d002?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80';

                card.innerHTML = `
                    <div class="product-img">
                        <img src="${item.image || defaultImg}" alt="${item.name}" loading="lazy">
                    </div>
                    <h3 class="product-title">${item.name}</h3>
                    <p class="product-desc">${item.description || 'Nuestra receta clásica desde 1955. Preparada con ingredientes frescos y queso derretido a la perfección.'}</p>
                    
                    <div class="diner-select">
                        <select class="size-select">
                            <option value="0">Tamaño Individual (Classic)</option>
                            <option value="40">Tamaño Mediana (+ $40.00)</option>
                            <option value="80">Tamaño Familiar (+ $80.00)</option>
                        </select>
                    </div>
                    
                    <div class="diner-checkbox">
                        <label>
                            <input type="checkbox" class="extra-check">
                            Relleno de Queso Extra (+ $35.00)
                        </label>
                    </div>

                    <div class="card-bottom">
                        <div class="price-tag">$<span class="price-val">${parseFloat(item.price).toFixed(2)}</span></div>
                        <button class="btn-add">Añadir</button>
                    </div>
                `;

                const sizeSelect = card.querySelector('.size-select');
                const extraCheck = card.querySelector('.extra-check');
                const priceVal = card.querySelector('.price-val');
                const btnAdd = card.querySelector('.btn-add');

                // Lógica de cálculo de precios en tiempo real
                const calculateTotal = () => {
                    let base = Number(item.price);
                    let sizeCost = Number(sizeSelect.value);
                    let extraCost = extraCheck.checked ? 35 : 0;
                    let total = base + sizeCost + extraCost;
                    priceVal.textContent = total.toFixed(2);
                    return total;
                };

                sizeSelect.addEventListener('change', calculateTotal);
                extraCheck.addEventListener('change', calculateTotal);

                // Lógica al dar click en Añadir
                btnAdd.addEventListener('click', () => {
                    const finalPrice = calculateTotal();
                    const sizeLabel = sizeSelect.options[sizeSelect.selectedIndex].text.split('(')[0].trim();
                    const extraLabel = extraCheck.checked ? 'Con extra queso' : '';
                    const details = `${sizeLabel} ${extraLabel ? ' - ' + extraLabel : ''}`;
                    
                    // Feedback visual retro en el botón
                    const originalText = btnAdd.textContent;
                    btnAdd.textContent = '¡Listo!';
                    btnAdd.style.backgroundColor = 'var(--diner-red)';
                    setTimeout(() => {
                        btnAdd.textContent = originalText;
                        btnAdd.style.backgroundColor = 'var(--diner-teal)';
                    }, 800);

                    cart.push({
                        name: item.name,
                        details: details.trim(),
                        price: finalPrice
                    });

                    updateTicket();
                });

                productGrid.appendChild(card);
            });
        }

        // Actualizar el DOM de la comanda (carrito)
        function updateTicket() {
            ticketItemsContainer.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                ticketItemsContainer.innerHTML = '<div class="empty-ticket">La comanda está en blanco. ¡Pide algo delicioso!</div>';
            } else {
                cart.forEach((item) => {
                    total += item.price;
                    ticketItemsContainer.innerHTML += `
                        <div class="order-item">
                            <div class="order-info">
                                <h4>1x ${item.name}</h4>
                                <span>${item.details}</span>
                            </div>
                            <div class="order-price">$${item.price.toFixed(2)}</div>
                        </div>
                    `;
                });
            }

            // Formatear totales y actualizar badges
            cartTotalEl.textContent = `$${total.toFixed(2)}`;
            cartBadge.textContent = cart.length;
            
            // Animación de sacudida (shake) para el badge
            cartBadge.animate([
                { transform: 'translateX(0)' },
                { transform: 'translateX(-3px) rotate(-3deg)' },
                { transform: 'translateX(3px) rotate(3deg)' },
                { transform: 'translateX(-3px) rotate(-3deg)' },
                { transform: 'translateX(3px) rotate(3deg)' },
                { transform: 'translateX(0)' }
            ], {
                duration: 400,
                iterations: 1
            });
        }

        // Iniciar la tienda
        initDiner();
    </script>
</body>
</html>
